<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="glow" x1="160" y1="160" x2="380" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="50%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="512" height="512" rx="114" fill="url(#bg5)"/>

  <!-- Three horizontal lines converging into a right node — multiplexed sessions joining one control point -->
  <!-- Top line -->
  <line x1="136" y1="176" x2="312" y2="176" stroke="url(#glow)" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="312" y1="176" x2="360" y2="256" stroke="url(#glow)" stroke-width="16" stroke-linecap="round" opacity="0.5"/>

  <!-- Middle line (primary) -->
  <line x1="136" y1="256" x2="360" y2="256" stroke="url(#glow)" stroke-width="20" stroke-linecap="round"/>

  <!-- Bottom line -->
  <line x1="136" y1="336" x2="312" y2="336" stroke="url(#glow)" stroke-width="16" stroke-linecap="round" opacity="0.5"/>
  <line x1="312" y1="336" x2="360" y2="256" stroke="url(#glow)" stroke-width="16" stroke-linecap="round" opacity="0.5"/>

  <!-- Control node (right convergence point) -->
  <circle cx="360" cy="256" r="16" fill="url(#glow)"/>

  <!-- Left dots (session origins) -->
  <circle cx="136" cy="176" r="8" fill="url(#glow)" opacity="0.5"/>
  <circle cx="136" cy="256" r="10" fill="url(#glow)"/>
  <circle cx="136" cy="336" r="8" fill="url(#glow)" opacity="0.5"/>
</svg>
