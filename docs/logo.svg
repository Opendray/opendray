<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Window glow gradient -->
    <linearGradient id="glowGrad" x1="0" y1="0" x2="400" y2="400">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <!-- Glow filter for the back window -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer squircle -->
  <rect width="512" height="512" rx="114" fill="url(#bgGrad)"/>

  <!-- === Back window (agent 3 — deepest, smallest) === -->
  <g filter="url(#shadow)" opacity="0.5">
    <rect x="100" y="88" width="280" height="200" rx="16" fill="#6366F1"/>
    <!-- Title bar -->
    <rect x="100" y="88" width="280" height="28" rx="16" fill="#7C3AED"/>
    <rect x="100" y="104" width="280" height="12" fill="#7C3AED"/>
    <!-- Traffic lights -->
    <circle cx="120" cy="102" r="5" fill="#EF4444" opacity="0.7"/>
    <circle cx="136" cy="102" r="5" fill="#EAB308" opacity="0.7"/>
    <circle cx="152" cy="102" r="5" fill="#22C55E" opacity="0.7"/>
  </g>

  <!-- === Middle window (agent 2) === -->
  <g filter="url(#shadow)" opacity="0.7">
    <rect x="80" y="128" width="320" height="224" rx="16" fill="#3B82F6"/>
    <!-- Title bar -->
    <rect x="80" y="128" width="320" height="32" rx="16" fill="#2563EB"/>
    <rect x="80" y="148" width="320" height="12" fill="#2563EB"/>
    <!-- Traffic lights -->
    <circle cx="102" cy="144" r="5.5" fill="#EF4444" opacity="0.8"/>
    <circle cx="120" cy="144" r="5.5" fill="#EAB308" opacity="0.8"/>
    <circle cx="138" cy="144" r="5.5" fill="#22C55E" opacity="0.8"/>
    <!-- Terminal content hint -->
    <rect x="104" y="176" width="60" height="4" rx="2" fill="white" opacity="0.15"/>
    <rect x="104" y="192" width="120" height="4" rx="2" fill="white" opacity="0.1"/>
    <rect x="104" y="208" width="80" height="4" rx="2" fill="white" opacity="0.08"/>
  </g>

  <!-- === Front window (agent 1 — primary, full detail) === -->
  <g filter="url(#shadow)">
    <!-- Window body -->
    <rect x="64" y="180" width="360" height="252" rx="18" fill="#0F172A"/>

    <!-- Title bar -->
    <rect x="64" y="180" width="360" height="36" rx="18" fill="#1E293B"/>
    <rect x="64" y="204" width="360" height="12" fill="#1E293B"/>

    <!-- Traffic lights -->
    <circle cx="90" cy="198" r="6.5" fill="#EF4444"/>
    <circle cx="110" cy="198" r="6.5" fill="#EAB308"/>
    <circle cx="130" cy="198" r="6.5" fill="#22C55E"/>

    <!-- Title text hint -->
    <rect x="200" y="193" width="80" height="10" rx="3" fill="white" opacity="0.12"/>

    <!-- Terminal content area -->
    <!-- Line 1: prompt + command -->
    <path d="M96 248 L120 262 L96 276" fill="none" stroke="#0EA5E9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="136" y="256" width="100" height="10" rx="3" fill="white" opacity="0.6"/>

    <!-- Line 2: output -->
    <rect x="96" y="292" width="200" height="8" rx="3" fill="#22C55E" opacity="0.4"/>

    <!-- Line 3: output -->
    <rect x="96" y="312" width="160" height="8" rx="3" fill="#22C55E" opacity="0.25"/>

    <!-- Line 4: new prompt with blinking cursor -->
    <path d="M96 340 L120 354 L96 368" fill="none" stroke="#0EA5E9" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="136" y="348" width="12" height="16" rx="2" fill="#0EA5E9" opacity="0.9"/>

    <!-- Line 5: faded -->
    <rect x="96" y="388" width="140" height="8" rx="3" fill="white" opacity="0.06"/>
  </g>

  <!-- Subtle connection lines between windows (multiplexed feel) -->
  <line x1="400" y1="200" x2="380" y2="160" stroke="#0EA5E9" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="400" y1="200" x2="360" y2="116" stroke="#6366F1" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>
</svg>
