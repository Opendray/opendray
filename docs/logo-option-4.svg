<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Three terminal chevrons — refined, proportional, with breathing room -->
  <!-- Top chevron (small, lighter) -->
  <path d="M168 144 L264 184 L168 224" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Middle chevron (large, primary, full opacity) -->
  <path d="M148 216 L296 268 L148 320" fill="none" stroke="url(#accent)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom chevron (small, lighter) -->
  <path d="M168 312 L264 352 L168 392" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- Cursor blocks — subtle, right-aligned -->
  <rect x="288" y="172" width="40" height="22" rx="5" fill="url(#accent)" opacity="0.3"/>
  <rect x="320" y="258" width="48" height="22" rx="5" fill="url(#accent)" opacity="0.85"/>
  <rect x="288" y="342" width="40" height="22" rx="5" fill="url(#accent)" opacity="0.3"/>
</svg>
