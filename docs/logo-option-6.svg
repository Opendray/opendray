<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="bar6" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect width="512" height="512" rx="114" fill="url(#bg6)"/>

  <!-- Abstract D: rounded spine + three floating bars with right curve -->

  <!-- Spine (left, rounded pill) -->
  <rect x="128" y="120" width="32" height="272" rx="16" fill="url(#bar6)"/>

  <!-- Top bar (floats with gap from spine) -->
  <rect x="180" y="120" width="136" height="32" rx="16" fill="url(#bar6)" opacity="0.55"/>

  <!-- Top-right curve connector -->
  <path d="M316 136 Q356 136 356 176" fill="none" stroke="url(#bar6)" stroke-width="32" stroke-linecap="round" opacity="0.55"/>

  <!-- Middle bar (longest, full opacity, the primary session) -->
  <rect x="180" y="240" width="176" height="32" rx="16" fill="url(#bar6)"/>

  <!-- Bottom bar -->
  <rect x="180" y="360" width="136" height="32" rx="16" fill="url(#bar6)" opacity="0.55"/>

  <!-- Bottom-right curve connector -->
  <path d="M316 376 Q356 376 356 336" fill="none" stroke="url(#bar6)" stroke-width="32" stroke-linecap="round" opacity="0.55"/>

  <!-- Right vertical connecting middle to curves -->
  <rect x="340" y="176" width="32" height="72" rx="16" fill="url(#bar6)" opacity="0.55"/>
  <rect x="340" y="264" width="32" height="72" rx="16" fill="url(#bar6)" opacity="0.55"/>
</svg>
