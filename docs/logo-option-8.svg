<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="windowBg" x1="80" y1="80" x2="440" y2="440">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="sh8" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#6366F1" flood-opacity="0.3"/>
    </filter>
    <filter id="sh8s" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Light squircle (Maestri-style light background) -->
  <rect width="512" height="512" rx="114" fill="url(#bg8)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="64" x2="512" y2="64" stroke="#64748B" stroke-width="0.5"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="#64748B" stroke-width="0.5"/>
    <line x1="0" y1="192" x2="512" y2="192" stroke="#64748B" stroke-width="0.5"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#64748B" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="512" y2="320" stroke="#64748B" stroke-width="0.5"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#64748B" stroke-width="0.5"/>
    <line x1="0" y1="448" x2="512" y2="448" stroke="#64748B" stroke-width="0.5"/>
    <line x1="64" y1="0" x2="64" y2="512" stroke="#64748B" stroke-width="0.5"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#64748B" stroke-width="0.5"/>
    <line x1="192" y1="0" x2="192" y2="512" stroke="#64748B" stroke-width="0.5"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#64748B" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="512" stroke="#64748B" stroke-width="0.5"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#64748B" stroke-width="0.5"/>
    <line x1="448" y1="0" x2="448" y2="512" stroke="#64748B" stroke-width="0.5"/>
  </g>

  <!-- Back glow window -->
  <g filter="url(#sh8)">
    <rect x="96" y="96" width="320" height="232" rx="20" fill="url(#windowBg)" opacity="0.6"/>
  </g>

  <!-- Front terminal window -->
  <g filter="url(#sh8s)">
    <!-- Window chrome (light, macOS style) -->
    <rect x="72" y="160" width="368" height="272" rx="18" fill="white"/>

    <!-- Title bar -->
    <rect x="72" y="160" width="368" height="40" rx="18" fill="#F1F5F9"/>
    <rect x="72" y="188" width="368" height="12" fill="#F1F5F9"/>

    <!-- Traffic lights -->
    <circle cx="100" cy="180" r="7" fill="#FF5F57"/>
    <circle cx="122" cy="180" r="7" fill="#FEBC2E"/>
    <circle cx="144" cy="180" r="7" fill="#28C840"/>

    <!-- Title: "opendray" -->
    <text x="256" y="185" text-anchor="middle" fill="#94A3B8" font-family="ui-monospace, monospace" font-size="13" font-weight="500">opendray</text>

    <!-- Terminal body (dark) -->
    <rect x="80" y="200" width="352" height="224" rx="0" fill="#0F172A"/>
    <rect x="80" y="412" width="352" height="20" rx="18" fill="#0F172A"/>

    <!-- Terminal content -->
    <!-- Prompt 1 -->
    <path d="M108 236 L132 252 L108 268" fill="none" stroke="#38BDF8" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="148" y="246" width="120" height="10" rx="4" fill="white" opacity="0.55"/>

    <!-- Output line -->
    <rect x="108" y="284" width="240" height="8" rx="3" fill="#4ADE80" opacity="0.35"/>

    <!-- Output line 2 -->
    <rect x="108" y="304" width="180" height="8" rx="3" fill="#4ADE80" opacity="0.2"/>

    <!-- Prompt 2 with cursor -->
    <path d="M108 336 L132 352 L108 368" fill="none" stroke="#38BDF8" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="148" y="344" width="14" height="18" rx="2" fill="#38BDF8"/>

    <!-- Faded bottom line -->
    <rect x="108" y="392" width="100" height="6" rx="3" fill="white" opacity="0.04"/>
  </g>
</svg>
