<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Option 3: "The Multiplexer"
    Abstract D shape made from three horizontal bars.
    Left spine + three bars + right arc segments.
    Each bar = a terminal session. The D = Dray.
  -->
  <rect width="512" height="512" rx="112" fill="#0F172A"/>

  <!-- Left spine -->
  <rect x="120" y="96" width="48" height="320" rx="24" fill="white"/>

  <!-- Top bar + right curve -->
  <path fill="white" d="
    M168 96 h128 c66 0 96 48 96 96 v0 h-48 c0 -32 -16 -48 -48 -48 h-128 z
  "/>

  <!-- Middle bar (full width to bowl) -->
  <rect x="168" y="232" width="224" height="48" rx="24" fill="white"/>

  <!-- Bottom bar + right curve -->
  <path fill="white" d="
    M168 416 h128 c66 0 96 -48 96 -96 v0 h-48 c0 32 -16 48 -48 48 h-128 z
  "/>
</svg>
