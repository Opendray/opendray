version: 2

project_name: opendray

# No `before.hooks` — Flutter's pub get + web build runs in the
# GitHub Actions workflow (.github/workflows/release.yml) before
# goreleaser starts. Doing it here too caused goreleaser to see
# pubspec.lock updates (floating minor versions on pub.dev) and
# abort with "git is in a dirty state".

builds:
  - id: opendray
    main: ./cmd/opendray
    binary: opendray
    env:
      - CGO_ENABLED=0
    # Windows is intentionally omitted until ConPTY support lands.
    # The core feature (spawning agent CLIs in a pseudo-terminal)
    # requires UNIX PTY via github.com/creack/pty, and the current
    # codebase has no Windows equivalent. Cross-compiling to Windows
    # would produce a binary that can't spawn sessions.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s
      - -w
      - -X main.version={{.Version}}
      - -X main.buildSha={{.ShortCommit}}
      - -X main.buildTime={{.Date}}

# Ship raw binaries — no tar.gz / .zip wrapper. The install.sh /
# install.ps1 scripts curl the binary directly, verify SHA256 against
# checksums.txt, and drop it in place. One less pair of tools the
# installer needs (tar / Expand-Archive).
archives:
  - id: opendray
    formats:
      - binary
    name_template: >-
      {{ .ProjectName }}-
      {{- .Os }}-
      {{- .Arch }}

checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256

release:
  github:
    owner: Opendray
    name: opendray
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'
      - '^ci:'
