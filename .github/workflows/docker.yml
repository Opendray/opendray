name: Docker

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Buildx is required for multi-platform builds; without it,
      # build-push-action silently produces a single-arch image.
      - uses: docker/setup-qemu-action@v3.7.0
      - uses: docker/setup-buildx-action@v4.0.0

      - uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5.10.0
        id: meta
        with:
          images: ghcr.io/opendray/opendray
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v6.19.2
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA layer cache — avoids re-downloading Flutter + Go toolchain
          # on every release. Cuts ~3 minutes off a typical build.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/opendray/opendray:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3.35.2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
