name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  # Linux-only targets (darwin/windows containers are a separate concern).
  # arm64 covers Apple Silicon, Raspberry Pi 4+, AWS Graviton, etc.
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  # Slim image — opendray binary only, no bundled agent CLIs.
  publish-slim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/opendray/opendray
          # latest=true forces a `:latest` tag on every push to the
          # default branch AND every semver tag — without this, the
          # default `latest=auto` only produces `:latest` on v* tags,
          # so main pushes leave users with no rolling tag to pull.
          flavor: |
            latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=slim
          cache-to: type=gha,scope=slim,mode=max
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scanner
        if: startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/opendray/opendray:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: startsWith(github.ref, 'refs/tags/')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # Full image — opendray + bundled Claude Code, Codex, Gemini CLI, OpenCode.
  publish-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/opendray/opendray
          # latest=true ensures `:latest` is generated; onlatest=true
          # then applies the -full suffix to it, giving us `:latest-full`
          # alongside per-tag `:v1.2.3-full` and per-commit `:sha-X-full`.
          flavor: |
            latest=true
            suffix=-full,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.full
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=full
          cache-to: type=gha,scope=full,mode=max
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scanner
        if: startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/opendray/opendray:${{ steps.meta.outputs.version }}-full
          format: 'sarif'
          output: 'trivy-full-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: startsWith(github.ref, 'refs/tags/')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-full-results.sarif'
