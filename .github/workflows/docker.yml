name: Docker

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'Dockerfile.full'
      - 'docker-compose.yml'
      - 'app/**'
      - 'cmd/**'
      - 'gateway/**'
      - 'kernel/**'
      - 'plugin/**'
      - 'plugins/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker.yml'
  tags:
    - 'v*'

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # Slim image — opendray binary only, no bundled agent CLIs.
  # Tag: ghcr.io/opendray/opendray:<version> (and :latest on main)
  publish-slim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/opendray/opendray
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy vulnerability scanner
        if: startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/opendray/opendray:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: startsWith(github.ref, 'refs/tags/')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # Full image — opendray + bundled Claude Code, Codex, Gemini CLI, OpenCode.
  # Tag: ghcr.io/opendray/opendray:<version>-full (and :latest-full on main)
  publish-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/opendray/opendray
          flavor: |
            suffix=-full,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.full
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy vulnerability scanner
        if: startsWith(github.ref, 'refs/tags/')
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/opendray/opendray:${{ steps.meta.outputs.version }}-full
          format: 'sarif'
          output: 'trivy-full-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: startsWith(github.ref, 'refs/tags/')
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-full-results.sarif'
