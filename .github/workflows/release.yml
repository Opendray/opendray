name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write      # for cosign OIDC + SLSA provenance attestation
  attestations: write  # for actions/attest-build-provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: beta
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: cd app && flutter pub get && flutter build web --release
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3
      - name: Sign checksums
        run: cosign sign-blob --yes dist/checksums.txt --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem
        env:
          COSIGN_EXPERIMENTAL: "1"

      # SLSA L3 build provenance — one attestation per release artifact
      # under dist/ matching the goreleaser archive pattern. Lets
      # downstream verifiers (Scorecard, sigstore-verify, Dependency-Track)
      # cryptographically trace binary ← commit ← workflow run.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4.1.0
        with:
          subject-path: 'dist/opendray_*.tar.gz'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-opendray.spdx.json
          output-file: dist/sbom-opendray.spdx.json

      - name: Upload SBOM to release
        run: gh release upload ${{ github.ref_name }} dist/sbom-opendray.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
