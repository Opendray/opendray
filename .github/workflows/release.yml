name: Release

# Triggered automatically on tag push (v*) — produces a published GitHub
# release with goreleaser archives, cosign-signed checksums, an anchore-
# generated SBOM, and release notes extracted from the matching section
# of CHANGELOG.md. The CHANGELOG bump PR is the review gate.
#
# workflow_dispatch is wired for two scenarios:
#   * Re-running the pipeline against an existing tag (e.g. v1.0.0,
#     which was tagged before this workflow existed).
#   * Smoke-testing the workflow without cutting a real release —
#     point it at a v0.0.0-test tag in your fork.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write   # create / append to GitHub release
  id-token: write   # cosign keyless OIDC (Sigstore Fulcio)

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false   # never cancel a release mid-flight

jobs:
  release:
    name: Release ${{ github.event.inputs.tag || github.ref_name }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      # Developer ID signing is opt-in: it activates only once the
      # MACOS_CERT_P12_BASE64 secret is configured. Until then every step
      # below that depends on it is skipped and the release is byte-for-byte
      # what it is today (ad-hoc macOS binaries).
      HAS_MACOS_SIGNING: ${{ secrets.MACOS_CERT_P12_BASE64 != '' }}
    steps:
      # ── Validate the tag input on manual dispatch BEFORE doing any
      #    heavy work (checkout, setup-go, goreleaser). A typo like
      #    `1.0.0` (missing v) or `V1.0.0` (uppercase) fails here in
      #    seconds instead of minutes-deep in goreleaser.
      - name: Validate tag format (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          echo "$INPUT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]' \
            || { echo "ERROR: tag must match v<semver> (e.g. v1.0.0), got: $INPUT_TAG"; exit 1; }

      - uses: actions/checkout@v5
        with:
          # Goreleaser walks the git history to compute the version +
          # changelog. Shallow clone trips it up; full history is the
          # safe default for releases.
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      # ── Frontend tooling — goreleaser's pre-build hooks invoke
      #    `pnpm install --frozen-lockfile` and `pnpm build` so the
      #    React SPA is in internal/web/dist before the Go build.
      #
      #    pnpm version is read from `packageManager` in package.json
      #    so the action-setup invocation stays version-less here.
      #    Setting `version:` here too triggers ERR_PNPM_BAD_PM_VERSION
      #    (pnpm/action-setup@v6 refuses multiple sources of truth).
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          # Monorepo lockfile lives at the repo root (see
          # pnpm-workspace.yaml). The pre-monorepo path
          # app/web/pnpm-lock.yaml no longer exists.
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      # ── quill: signs + notarizes Mach-O binaries with a Developer ID
      #    from a Linux runner (no macOS runner / Xcode). Installed only
      #    when signing is configured; goreleaser's per-build post hook
      #    (scripts/macos-sign.sh) calls it for the darwin artifacts.
      - name: Install quill (macOS Developer ID signing)
        if: env.HAS_MACOS_SIGNING == 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/quill/main/install.sh | sh -s -- -b /usr/local/bin
          quill version

      # ── Extract the matching CHANGELOG section into release-notes.md
      #    so goreleaser uses it as the release body instead of the
      #    static "See CHANGELOG.md" placeholder. Falls back to that
      #    placeholder if the tag has no section yet (re-running an
      #    old tag via workflow_dispatch).
      # Write the extracted notes OUTSIDE the work tree ($RUNNER_TEMP).
      # goreleaser's `release` aborts on a dirty tree, and a notes file
      # under the repo root shows up as an untracked file ("git is in a
      # dirty state ?? release-notes.md"). Keeping it in the temp dir
      # leaves the tree clean.
      - name: Extract release notes from CHANGELOG.md
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          notes="$RUNNER_TEMP/release-notes.md"
          ver="${TAG#v}"
          awk -v ver="$ver" '
            $0 ~ "^## \\[v" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "$notes"
          if [ ! -s "$notes" ]; then
            echo "(no CHANGELOG section found for $TAG — using fallback notes)"
            echo "See [CHANGELOG.md](https://github.com/Opendray/opendray/blob/main/CHANGELOG.md) for the full release notes." > "$notes"
          fi
          echo "--- release-notes.md ($(wc -l < "$notes") lines) ---"
          head -30 "$notes"

      # ── Goreleaser: archives + checksums in ./dist, published release on GH.
      #    --release-notes overrides the static header in .goreleaser.yml
      #    with the extracted CHANGELOG section. SHA-pinned for supply-
      #    chain integrity. On v7 (node24) — validated end-to-end against a
      #    v0.0.0-test prerelease tag before this landed.
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94  # v7.2.3
        with:
          version: latest
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Developer ID signing + notarization (consumed by the
          # build's post hook → scripts/macos-sign.sh → quill). All empty
          # until the secrets are set, in which case the hook is a no-op.
          # The .p12 / .p8 are secrets; the ASC key id + issuer are plain
          # identifiers (also embedded in the signed binary).
          QUILL_SIGN_P12: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          QUILL_SIGN_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_NOTARY_KEY_P8: ${{ secrets.MACOS_NOTARY_KEY_P8 }}
          QUILL_NOTARY_KEY_ID: BPL8QFJ8M2
          QUILL_NOTARY_ISSUER: d2ec008d-9e90-49a5-82f5-d5dfbdeff726

      # ── Cosign keyless: sign the SHA256SUMS produced by goreleaser.
      #    No long-lived signing key — Sigstore Fulcio mints a short-
      #    lived cert tied to this workflow's OIDC identity. Verifying
      #    later: cosign verify-blob --certificate ...pem --signature
      #    ...sig --certificate-identity-regexp ... SHA256SUMS
      #    SHA-pinned for supply-chain integrity.
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3
      - name: Sign checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Upload cosign artefacts to release
        if: success()
        run: |
          gh release upload "$TAG" \
            dist/SHA256SUMS.sig \
            dist/SHA256SUMS.pem \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── SBOM (SPDX). Belt-and-braces: anchore's auto-attach has
      #    historically been flaky, so generate explicitly + upload via
      #    gh release. Soft failure (continue-on-error) so a transient
      #    SBOM hiccup doesn't block the rest of the release.
      #    SHA-pinned for supply-chain integrity.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        continue-on-error: true
        with:
          artifact-name: sbom-opendray.spdx.json
          output-file: dist/sbom-opendray.spdx.json

      - name: Upload SBOM to release
        if: always() && hashFiles('dist/sbom-opendray.spdx.json') != ''
        run: gh release upload "$TAG" dist/sbom-opendray.spdx.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, '-') }}
    permissions:
      contents: read
      id-token: write   # required for `npm publish --provenance`
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-npm.mjs --tag "$TAG"
