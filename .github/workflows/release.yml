name: Release

# Triggered automatically on tag push (v*) — produces a draft GitHub
# release with goreleaser archives, cosign-signed checksums, and an
# anchore-generated SBOM. The release lands as DRAFT (per
# .goreleaser.yml release.draft: true) so a human reviews notes before
# flipping it to public.
#
# workflow_dispatch is wired for two scenarios:
#   * Re-running the pipeline against an existing tag (e.g. v1.0.0,
#     which was tagged before this workflow existed).
#   * Smoke-testing the workflow without cutting a real release —
#     point it at a v0.0.0-test tag in your fork.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0). Must already exist.'
        required: true
        type: string

permissions:
  contents: write   # create / append to GitHub release
  id-token: write   # cosign keyless OIDC (Sigstore Fulcio)
  # NOTE: `packages: write` is granted only to the `ghcr` job below.
  # The `release` job stays at contents+id-token least-privilege; even
  # if a goreleaser action were ever compromised it could not push to
  # ghcr.io.

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false   # never cancel a release mid-flight

jobs:
  release:
    name: Release ${{ github.event.inputs.tag || github.ref_name }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      # ── Validate the tag input on manual dispatch BEFORE doing any
      #    heavy work (checkout, setup-go, goreleaser). A typo like
      #    `1.0.0` (missing v) or `V1.0.0` (uppercase) fails here in
      #    seconds instead of minutes-deep in goreleaser.
      - name: Validate tag format (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          echo "$INPUT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]' \
            || { echo "ERROR: tag must match v<semver> (e.g. v1.0.0), got: $INPUT_TAG"; exit 1; }

      - uses: actions/checkout@v5
        with:
          # Goreleaser walks the git history to compute the version +
          # changelog. Shallow clone trips it up; full history is the
          # safe default for releases.
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      # ── Frontend tooling — goreleaser's pre-build hooks invoke
      #    `pnpm install --frozen-lockfile` and `pnpm build` so the
      #    React SPA is in internal/web/dist before the Go build.
      #
      #    pnpm version is read from `packageManager` in package.json
      #    so the action-setup invocation stays version-less here.
      #    Setting `version:` here too triggers ERR_PNPM_BAD_PM_VERSION
      #    (pnpm/action-setup@v4 refuses multiple sources of truth).
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: app/web/pnpm-lock.yaml

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      # ── Goreleaser: archives + checksums in ./dist, draft release on GH.
      #    SHA-pinned for supply-chain integrity. Intentionally pinned
      #    on v6 (not v7) to avoid the v7 ESM/Node 24 breaking change
      #    until we explicitly validate it.
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Cosign keyless: sign the SHA256SUMS produced by goreleaser.
      #    No long-lived signing key — Sigstore Fulcio mints a short-
      #    lived cert tied to this workflow's OIDC identity. Verifying
      #    later: cosign verify-blob --certificate ...pem --signature
      #    ...sig --certificate-identity-regexp ... SHA256SUMS
      #    SHA-pinned for supply-chain integrity.
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3
      - name: Sign checksums
        run: |
          cosign sign-blob --yes \
            --output-signature dist/SHA256SUMS.sig \
            --output-certificate dist/SHA256SUMS.pem \
            dist/SHA256SUMS

      - name: Upload cosign artefacts to release
        if: success()
        run: |
          gh release upload "$TAG" \
            dist/SHA256SUMS.sig \
            dist/SHA256SUMS.pem \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── SBOM (SPDX). Belt-and-braces: anchore's auto-attach has
      #    historically been flaky, so generate explicitly + upload via
      #    gh release. Soft failure (continue-on-error) so a transient
      #    SBOM hiccup doesn't block the rest of the release.
      #    SHA-pinned for supply-chain integrity.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        continue-on-error: true
        with:
          artifact-name: sbom-opendray.spdx.json
          output-file: dist/sbom-opendray.spdx.json

      - name: Upload SBOM to release
        if: always() && hashFiles('dist/sbom-opendray.spdx.json') != ''
        run: gh release upload "$TAG" dist/sbom-opendray.spdx.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── GHCR push ────────────────────────────────────────────────────
  # Builds the multi-arch image from the repo Dockerfile and pushes
  # to ghcr.io/opendray/opendray with the right semver tag set. Runs
  # only after the `release` job succeeds, so a goreleaser failure
  # (broken tag, build error, etc.) prevents an "image without
  # corresponding GH release" inconsistency.
  #
  # Job-scoped permissions: contents: read (private repo checkout),
  # packages: write (GHCR push). No id-token here — the binary is
  # already signed at the release-job layer; image signing would be a
  # follow-up using the same cosign workflow if/when desired.
  ghcr:
    name: GHCR push ${{ github.event.inputs.tag || github.ref_name }}
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # Computed once so VERSION/COMMIT/DATE all match across the run.
      # github.event.head_commit.timestamp is null on workflow_dispatch,
      # so derive DATE in-shell rather than from the event payload.
      - name: Compute build metadata
        id: meta_build
        run: |
          {
            echo "VERSION=${TAG#v}"
            echo "COMMIT=$(git rev-parse --short HEAD)"
            echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3.7.0
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action computes the right tag set from the
      # semver tag. flavor: latest=auto skips :latest on pre-releases
      # (e.g. v1.0.0-rc1) but tags it on stable versions. For
      # workflow_dispatch against an old tag, the action does NOT
      # compare against the registry — it only looks at the input
      # tag's semver — so dispatching v0.5.0 in 2027 would
      # incorrectly move :latest. Mitigation: dispatch only the
      # current/latest tag, or accept that follow-up rebuilds
      # require a manual `docker tag` to fix :latest afterwards.
      # `value=${{ env.TAG }}` overrides on every rule so the same
      # ruleset works for both trigger paths:
      #   * push on a `v*` tag — github.ref is `refs/tags/vX.Y.Z`,
      #     metadata-action would derive the semver itself.
      #   * workflow_dispatch — github.ref is `refs/heads/main`, so
      #     the action's default tag-derivation finds nothing and
      #     emits zero tags (buildx then fails with "tag is needed
      #     when pushing to registry"). Forcing `value=` from the
      #     dispatch input bypasses ref inspection entirely.
      - uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
        id: meta
        with:
          images: ghcr.io/opendray/opendray
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}},value=${{ env.TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG }}
            type=raw,value=${{ env.TAG }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.meta_build.outputs.VERSION }}
            COMMIT=${{ steps.meta_build.outputs.COMMIT }}
            DATE=${{ steps.meta_build.outputs.DATE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=opendray
          cache-to: type=gha,scope=opendray,mode=max
