name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # for cosign OIDC
  actions: read    # anchore/sbom-action re-downloads its own workflow
                   # artifact before attaching to the release. Without
                   # this the "Attaching SBOMs to release" call 403s
                   # and the downstream manual upload gets skipped.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: beta
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      # Inject the git tag into the Flutter build so package_info_plus
      # returns e.g. "0.3.1" on both web + mobile, matching the Go
      # binary's -X main.version=${{ .Version }} from goreleaser.
      - run: |
          V="${GITHUB_REF_NAME#v}"
          cd app && flutter pub get && flutter build web --release \
            --build-name="$V" --build-number="$GITHUB_RUN_NUMBER"
      # `flutter pub get` refreshes pubspec.lock against the live
      # pub.dev index; restore the committed version so goreleaser's
      # "no dirty tree" guard passes. The build itself is already
      # complete and lives in app/build/web/.
      - run: git checkout -- app/pubspec.lock
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3
      - name: Sign checksums
        run: cosign sign-blob --yes dist/SHA256SUMS --output-signature dist/SHA256SUMS.sig --output-certificate dist/SHA256SUMS.pem
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Upload cosign artifacts to release
        run: |
          gh release upload ${{ github.ref_name }} dist/SHA256SUMS.sig dist/SHA256SUMS.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Belt-and-braces: even with `actions: read` granted, if anchore's
      # attach-to-release logic ever regresses we don't want the SBOM
      # upload to vanish silently. The output-file is written *before*
      # the attach attempt, so the next step can always upload it.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        continue-on-error: true
        with:
          artifact-name: sbom-opendray.spdx.json
          output-file: dist/sbom-opendray.spdx.json

      - name: Upload SBOM to release
        if: always() && hashFiles('dist/sbom-opendray.spdx.json') != ''
        run: gh release upload ${{ github.ref_name }} dist/sbom-opendray.spdx.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
