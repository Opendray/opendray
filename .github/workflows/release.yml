name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # for cosign OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: beta
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: cd app && flutter pub get && flutter build web --release
      # `flutter pub get` refreshes pubspec.lock against the live
      # pub.dev index; restore the committed version so goreleaser's
      # "no dirty tree" guard passes. The build itself is already
      # complete and lives in app/build/web/.
      - run: git checkout -- app/pubspec.lock
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3
      - name: Sign checksums
        run: cosign sign-blob --yes dist/SHA256SUMS --output-signature dist/SHA256SUMS.sig --output-certificate dist/SHA256SUMS.pem
        env:
          COSIGN_EXPERIMENTAL: "1"

      - name: Upload cosign artifacts to release
        run: |
          gh release upload ${{ github.ref_name }} dist/SHA256SUMS.sig dist/SHA256SUMS.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: sbom-opendray.spdx.json
          output-file: dist/sbom-opendray.spdx.json

      - name: Upload SBOM to release
        run: gh release upload ${{ github.ref_name }} dist/sbom-opendray.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
