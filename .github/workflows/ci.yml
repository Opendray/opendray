name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build -o /dev/null ./cmd/opendray

  frontend:
    name: Frontend (Flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: beta
      - run: cd app && flutter pub get
      - run: cd app && flutter analyze --no-fatal-infos
      - run: cd app && flutter build web --release
