<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 主渐变：从粉红 → 红 → 橙色（左上到右下）-->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#E91E63"/>
      <stop offset="45%" stop-color="#F4255A"/>
      <stop offset="75%" stop-color="#FF4C2A"/>
      <stop offset="100%" stop-color="#FF7A18"/>
    </linearGradient>

    <!-- "i" 用稍微偏粉的实色（与原图一致）-->
    <linearGradient id="iGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#E91E63"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </linearGradient>

    <!-- 中间小圆点的渐变（红橙）-->
    <linearGradient id="dotGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4255A"/>
      <stop offset="100%" stop-color="#FF4C2A"/>
    </linearGradient>
  </defs>

  <!-- 字母 "i" — 竖线带顶部和底部圆点（哑铃造型）-->
  <g fill="url(#iGradient)">
    <!-- 顶部圆点 -->
    <circle cx="320" cy="270" r="78"/>
    <!-- 中部竖线（圆头矩形）-->
    <rect x="278" y="290" width="84" height="470" rx="42" ry="42"/>
    <!-- 底部圆点 -->
    <circle cx="320" cy="780" r="78"/>
  </g>

  <!-- 字母 "D" — 右侧开口环（粉到橙的渐变描边路径）-->
  <path d="M 470 230
           C 700 230, 830 360, 830 512
           C 830 664, 700 794, 470 794"
        fill="none"
        stroke="url(#brandGradient)"
        stroke-width="92"
        stroke-linecap="round"/>

  <!-- 中间的小圆点（在 D 内部） -->
  <circle cx="555" cy="512" r="62" fill="url(#dotGradient)"/>
</svg>
