<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OpenDray — self-hosted AI workbench.">
  <meta name="theme-color" content="#0B0D11">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OpenDray">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OpenDray</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0B0D11; }
    /* Splash shown until Flutter boots — avoids the stark white flash. */
    #splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0B0D11;
      transition: opacity 240ms ease-out;
    }
    #splash.fade { opacity: 0; pointer-events: none; }
    #splash img { width: 96px; height: 96px; border-radius: 20px; }
  </style>
</head>
<body>
  <div id="splash"><img src="icons/Icon-192.png" alt="OpenDray"/></div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('fade'); setTimeout(function(){ s.remove(); }, 260); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
